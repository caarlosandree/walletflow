spring.application.name=walletflow

# Carrega variaveis do arquivo .env na raiz do projeto (formato KEY=VALUE).
# O sufixo [.properties] faz o Spring tratar o .env como properties file.
# 'optional:' evita falha quando o .env nao existe (ex: CI, producao).
spring.config.import=optional:file:.env[.properties]

# Concorrência: cada request e cada listener @Async roda em virtual thread (Java 25).
spring.threads.virtual.enabled=true

# Outbox: reprocessa eventos pendentes (não entregues) ao reiniciar a aplicação.
spring.modulith.events.republish-outstanding-events-on-restart=true

# Datasource (PostgreSQL em produção; sobrescrito por H2 no perfil de teste).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/walletflow}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Flyway é dono do schema; Hibernate não gera nem valida DDL.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Migrations: 'common' (portáveis) + específicas do banco. O perfil de teste troca para o diretório h2.
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/postgresql
