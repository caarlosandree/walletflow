# Perfil de teste: H2 em memória (modo nativo).
spring.datasource.url=jdbc:h2:mem:walletflow;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# Nos testes: migrations portáveis ('common') + as específicas de H2.
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/h2
